<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたに合う猫の種類診断</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0e68c, #add8e6); /* 淡い黄色から水色のグラデーション */
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #4a4a4a;
            margin-bottom: 25px;
            font-size: 2.2em;
        }

        h2 {
            color: #555;
            margin-top: 25px;
            margin-bottom: 20px;
            font-size: 1.6em;
        }

        p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .options label {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            font-size: 1.1em;
            text-align: left;
        }

        .options label:hover {
            background-color: #eef;
            border-color: #b0c4de;
        }

        .options input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3); /* ラジオボタンを少し大きくする */
            accent-color: #6a9acb; /* チェック時の色 */
        }

        button {
            background-color: #6a9acb;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: #4f7aa7;
            transform: translateY(-2px);
        }

        #result-section {
            display: none;
        }

        .share-button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #1DA1F2; /* X (旧Twitter) のブランドカラー */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .share-button:hover {
            background-color: #1480C1;
        }

        .share-button img {
            vertical-align: middle;
            margin-right: 8px;
            height: 20px; /* Xアイコンのサイズ調整 */
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }
            h2 {
                font-size: 1.4em;
            }
            .card {
                padding: 20px;
            }
            .options label {
                font-size: 1em;
                padding: 12px 15px;
            }
            button {
                padding: 12px 25px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>あなたに合う猫の種類診断</h1>

            <div id="quiz-section">
                <div id="question-container" class="question-container">
                    <!-- 質問がここに動的に挿入されます -->
                </div>
                <button id="next-button">診断する</button>
            </div>

            <div id="result-section">
                <h2 id="result-title"></h2>
                <p id="result-description"></p>
                <a id="share-button" class="share-button" target="_blank" rel="noopener noreferrer">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/twitterx--v1.png" alt="Xアイコン">
                    結果をXでシェア
                </a>
                <button id="reset-button">もう一度診断する</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "家で過ごす休日の過ごし方は？",
                options: [
                    { text: "読書や映画鑑賞でまったり過ごす", points: 1 },
                    { text: "趣味に没頭、新しいことを学ぶ", points: 2 },
                    { text: "友達を呼んでパーティーをする", points: 3 },
                    { text: "外に出てアクティブに活動する", points: 4 }
                ]
            },
            {
                question: "あなたの性格を表す言葉は？",
                options: [
                    { text: "静かで控えめ", points: 1 },
                    { text: "好奇心旺盛で探究心がある", points: 2 },
                    { text: "社交的で人懐っこい", points: 3 },
                    { text: "エネルギッシュで独立心が強い", points: 4 }
                ]
            },
            {
                question: "ストレスを感じた時、どうしますか？",
                options: [
                    { text: "一人で静かに過ごす", points: 1 },
                    { text: "気分転換に何か新しいことを試す", points: 2 },
                    { text: "誰かに話を聞いてもらう", points: 3 },
                    { text: "体を動かして発散する", points: 4 }
                ]
            },
            {
                question: "新しい環境に慣れるまでどれくらいかかりますか？",
                options: [
                    { text: "時間がかかり、慎重になる", points: 1 },
                    { text: "興味があれば比較的早く慣れる", points: 2 },
                    { text: "比較的早く慣れる方", points: 3 },
                    { text: "全く問題なくすぐに馴染める", points: 4 }
                ]
            },
            {
                question: "あなたが猫を飼うなら、どんな関係を望みますか？",
                options: [
                    { text: "静かに寄り添ってくれる存在", points: 1 },
                    { text: "一緒に遊んだり学んだりできる相棒", points: 2 },
                    { text: "いつも甘えてくる癒やし", points: 3 },
                    { text: "自由奔放だけど時々甘えてくるパートナー", points: 4 }
                ]
            }
        ];

        const results = [
            {
                minPoints: 5, maxPoints: 8,
                title: "ロシアンブルー",
                description: "あなたは静かで落ち着いた環境を好む、知的で感受性豊かなタイプです。そんなあなたには、上品で物静かなロシアンブルーがぴったり。控えめながらも深い愛情であなたに寄り添ってくれるでしょう。"
            },
            {
                minPoints: 9, maxPoints: 12,
                title: "マンチカン",
                description: "あなたは好奇心旺盛で遊び好きな一面を持つ、探究心のあるタイプです。そんなあなたには、短い足でちょこまかと遊びまわる姿が可愛らしいマンチカンがおすすめ。毎日を楽しく、遊び心いっぱいに彩ってくれるはずです。"
            },
            {
                minPoints: 13, maxPoints: 16,
                title: "スコティッシュフォールド",
                description: "あなたは社交的で人懐っこく、周囲との調和を大切にするタイプです。そんなあなたには、穏やかで甘えん坊なスコティッシュフォールドが最適。その愛らしいルックスと人懐っこさで、あなたの心を常に癒してくれるでしょう。"
            },
            {
                minPoints: 17, maxPoints: 20,
                title: "ベンガル",
                description: "あなたはエネルギッシュで独立心が強く、刺激的な毎日を求めるタイプです。そんなあなたには、野生的な魅力と活発さを兼ね備えたベンガルがぴったり。一緒に遊び、新しい発見に満ちた刺激的な日々を送れることでしょう。"
            }
        ];

        let currentQuestionIndex = 0;
        let totalPoints = 0;
        const quizSection = document.getElementById('quiz-section');
        const resultSection = document.getElementById('result-section');
        const questionContainer = document.getElementById('question-container');
        const nextButton = document.getElementById('next-button');
        const resultTitle = document.getElementById('result-title');
        const resultDescription = document.getElementById('result-description');
        const shareButton = document.getElementById('share-button');
        const resetButton = document.getElementById('reset-button');

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            questionContainer.innerHTML = `
                <h2>Q${currentQuestionIndex + 1}. ${q.question}</h2>
                <div class="options">
                    ${q.options.map((option, index) => `
                        <label>
                            <input type="radio" name="question${currentQuestionIndex}" value="${option.points}" required>
                            ${option.text}
                        </label>
                    `).join('')}
                </div>
            `;
            // 最後の質問ならボタンのテキストを変更
            if (currentQuestionIndex === questions.length - 1) {
                nextButton.textContent = '診断結果を見る';
            } else {
                nextButton.textContent = '次の質問へ';
            }
        }

        function nextQuestion() {
            const selectedOption = document.querySelector(`input[name="question${currentQuestionIndex}"]:checked`);
            if (!selectedOption) {
                alert('質問に回答してください！');
                return;
            }
            totalPoints += parseInt(selectedOption.value);
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                displayQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizSection.style.display = 'none';
            resultSection.style.display = 'block';

            const finalResult = results.find(r => totalPoints >= r.minPoints && totalPoints <= r.maxPoints);

            resultTitle.textContent = `あなたに合う猫は「${finalResult.title}」です！`;
            resultDescription.textContent = finalResult.description;

            // Xシェアボタンの設定
            const shareText = `診断結果は「${finalResult.title}」でした！あなたに合う猫を診断してみよう！`;
            const shareUrl = encodeURIComponent(window.location.href);
            shareButton.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${shareUrl}&hashtags=猫の種類診断`;
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            totalPoints = 0;
            quizSection.style.display = 'block';
            resultSection.style.display = 'none';
            displayQuestion();
        }

        nextButton.addEventListener('click', nextQuestion);
        resetButton.addEventListener('click', resetQuiz);

        // 初期表示
        displayQuestion();
    </script>
</body>
</html>
